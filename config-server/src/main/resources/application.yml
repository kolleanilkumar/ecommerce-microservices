server:
  port: 8888

spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        git:
          uri: https://github.com/kolleanilkumar/ecommerce-microservices.git
          default-label: main
          search-paths:
            - configs
          clone-on-start: true

eureka:
  instance:
    hostname: localhost
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: false

  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/